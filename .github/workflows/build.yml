name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.28.2'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            electron_platform: win32
            arch: x64
            artifact_name: release-windows-x64
            files: |
              release/astrbot-live2d-desktop-v*-win-x64.exe
              release/astrbot-live2d-desktop-v*-portable-x64.exe
              release/*.blockmap
              release/latest.yml
          - os: windows-latest
            target: win
            electron_platform: win32
            arch: arm64
            artifact_name: release-windows-arm64
            files: |
              release/astrbot-live2d-desktop-v*-win-arm64.exe
              release/astrbot-live2d-desktop-v*-portable-arm64.exe
              release/*.blockmap
          - os: macos-latest
            target: mac
            electron_platform: darwin
            arch: x64
            artifact_name: release-macos-x64
            files: |
              release/astrbot-live2d-desktop-v*-mac-x64.dmg
              release/astrbot-live2d-desktop-v*-mac-x64.zip
              release/*.blockmap
              release/latest*.yml
          - os: macos-latest
            target: mac
            electron_platform: darwin
            arch: arm64
            artifact_name: release-macos-arm64
            files: |
              release/astrbot-live2d-desktop-v*-mac-arm64.dmg
              release/astrbot-live2d-desktop-v*-mac-arm64.zip
              release/*.blockmap
          - os: ubuntu-latest
            target: linux
            electron_platform: linux
            arch: x64
            artifact_name: release-linux-x64
            files: |
              release/astrbot-live2d-desktop-v*-linux-x86_64.AppImage
              release/astrbot-live2d-desktop-v*-linux-amd64.deb
              release/astrbot-live2d-desktop-v*-linux-x86_64.rpm
              release/latest*.yml
          - os: ubuntu-latest
            target: linux
            electron_platform: linux
            arch: arm64
            artifact_name: release-linux-arm64
            files: |
              release/astrbot-live2d-desktop-v*-linux-*arm64*.AppImage
              release/astrbot-live2d-desktop-v*-linux-*aarch64*.AppImage
              release/astrbot-live2d-desktop-v*-linux-*arm64*.deb
              release/astrbot-live2d-desktop-v*-linux-*arm64*.rpm
              release/astrbot-live2d-desktop-v*-linux-*aarch64*.rpm

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate
          pnpm --version

      - name: Setup Python (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python setuptools
        run: pip install setuptools

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Frontend and Electron Bundles
        run: pnpm run build:prepare
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Rebuild Native Dependencies (${{ matrix.electron_platform }}-${{ matrix.arch }})
        run: pnpm run rebuild -- --platform=${{ matrix.electron_platform }} --arch=${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Package (${{ matrix.target }}-${{ matrix.arch }})
        run: pnpm exec electron-builder --${{ matrix.target }} --${{ matrix.arch }} --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: previoustag
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -n 1)
          echo "tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
          echo "Previous tag: $PREVIOUS_TAG"

      - name: Generate changelog
        id: changelog
        run: |
          if [ -z "${{ steps.previoustag.outputs.tag }}" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${{ github.ref_name }})
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${{ steps.previoustag.outputs.tag }}..${{ github.ref_name }})
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## 更新内容

            ${{ steps.changelog.outputs.changelog }}

            ## 下载说明

            - Windows: `*-win-x64.exe` / `*-win-arm64.exe`（安装版），或 `*-portable-x64.exe` / `*-portable-arm64.exe`（便携版）
            - macOS: `*-mac-x64.dmg` / `*-mac-arm64.dmg`
            - Linux: `x86_64` / `arm64` 的 `AppImage`、`deb`、`rpm`

            > 首次启动时，应用会提示下载 Live2D Cubism SDK（约 200KB），点击确定即可自动下载。

            ## 相关链接

            - [使用教程](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/USAGE_TUTORIAL.zh-CN.md)
            - [AstrBot Live2D 适配器](https://github.com/lxfight/astrbot_plugin_live2d_adapter)
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
